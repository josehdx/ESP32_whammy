; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:stable]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = ttgo-t1
framework = arduino
lib_deps = 
	tttapa/Control Surface@^2.1.0
	bodmer/TFT_eSPI@^2.5.43
	h2zero/NimBLE-Arduino@^2.3.9
monitor_speed = 31250
build_flags = 
	-D CS_USE_NIMBLE=1
	-D CORE_DEBUG_LEVEL=4
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_WIDTH=135
	-D TFT_HEIGHT=240
	-D CGRAM_OFFSET=1
	-D TFT_MISO=-1
	-D TFT_MOSI=19
	-D TFT_SCLK=18
	-D TFT_CS=5
	-D TFT_DC=16
	-D TFT_RST=23
	-D TFT_BL=4
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D SPI_FREQUENCY=40000000
	-D ARDUINO_VARIANT="esp32"
	-D CONFIG_BT_ENABLED=1
	-D CONFIG_BT_NIMBLE_ENABLED=1
	-D CONFIG_BT_NIMBLE_NVS_PERSIST=1
	-D CONFIG_BT_NIMBLE_MAX_BONDS=5
	-D CONFIG_BT_NIMBLE_MAX_CCCDS=20
	-D CONFIG_BT_BLUEDROID_ENABLED=0
